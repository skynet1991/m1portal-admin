<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>m1portal | Yönetim Paneli</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: none; } /* Şifre girilene kadar gizle */
        .login-container { display: flex; height: 100vh; justify-content: center; align-items: center; background: var(--bg); }
        .login-box { background: var(--card); padding: 40px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .container { max-width: 1300px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h2, h3 { color: var(--blue); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0d1117; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 13px; }
        th { background: #1c2128; color: var(--blue); }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: #fff; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        .btn-green { background: var(--green); }
        input, select { background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 4px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .badge { background: var(--green); color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 11px; margin-left: 10px; }
    </style>
</head>
<body id="mainBody">

<div id="loginArea" class="login-container">
    <div class="login-box">
        <h2 style="color: #fff;">m1portal Access</h2>
        <input type="password" id="adminPass" placeholder="Yönetici Anahtarı" style="width: 200px; margin-bottom: 20px;"><br>
        <button class="btn btn-blue" onclick="checkLogin()">Giriş Yap</button>
    </div>
</div>

<div id="dashboardArea" class="container" style="display: none;">
    <div class="card">
        <h2>🚀 m1portal Kontrol Paneli <small id="adminName" style="font-size: 12px; color: var(--text);"></small></h2>
    </div>

    <div class="card">
        <h3>👥 Kayıtlı Kullanıcılar</h3>
        <div id="userList">Yükleniyor...</div>
    </div>

    <div id="reportSection" class="card" style="display:none;">
        <h3>📊 İşlem Raporu: <span id="reportingUser"></span></h3>
        <div style="margin-bottom: 15px;">
            <select id="reportYear"><option value="2026">2026</option><option value="2025">2025</option></select>
            <select id="reportMonth">
                <option value="01">Ocak</option><option value="02">Şubat</option><option value="03">Mart</option>
                <option value="04">Nisan</option><option value="05">Mayıs</option><option value="06">Haziran</option>
                <option value="07">Temmuz</option><option value="08">Ağustos</option><option value="09">Eylül</option>
                <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
            </select>
            <button class="btn btn-blue" onclick="generateReport()">Sorgula</button>
        </div>
        <div id="reportContent"></div>
    </div>
</div>

<script>
    // --- BURAYI KENDİ BİLGİLERİNLE DOLDUR ---
    const firebaseConfig = {
        databaseURL: "https://m1portal-default-rtdb.firebaseio.com" // Kendi URL'ni buraya yapıştır
    };
    const YONETICI_SIFRESI = "123456"; // Paneli açacak şifre
    // ---------------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeReportIp = "";

    // Sayfayı göster
    document.getElementById("mainBody").style.display = "block";

    function checkLogin() {
        const pass = document.getElementById("adminPass").value;
        if(pass === YONETICI_SIFRESI) {
            document.getElementById("loginArea").style.display = "none";
            document.getElementById("dashboardArea").style.display = "block";
            document.getElementById("adminName").innerText = "Yönetici Modu Aktif";
            loadUsers();
        } else {
            alert("Hatalı şifre!");
        }
    }

    function loadUsers() {
        db.ref("AllowedIPs").on("value", snap => {
            const users = snap.val();
            let html = "";
            for(let ip in users) {
                const u = users[ip];
                html += `
                <div class="user-row">
                    <div>
                        <strong>${u.UserName}</strong> 
                        <span id="ecz_${ip}" class="badge">Eczane: Bekleniyor...</span>
                        <div style="font-size: 12px; color: #8b949e; margin-top:5px;">IP: ${ip.replace(/_/g,'.')}</div>
                    </div>
                    <div>
                        <button class="btn btn-blue" onclick="setReportUser('${ip}', '${u.UserName}')">Raporla</button>
                        <button class="btn ${u.Status === 'Active' ? 'btn-red' : 'btn-green'}" onclick="toggleUser('${ip}', '${u.Status}')">
                            ${u.Status === 'Active' ? 'Durdur' : 'Aktif Et'}
                        </button>
                    </div>
                </div>`;
                updateEczaneBadge(ip);
            }
            document.getElementById("userList").innerHTML = html;
        });
    }

    function updateEczaneBadge(ip) {
        db.ref("LiveTraffic/" + ip).on("value", snap => {
            const data = snap.val();
            const el = document.getElementById("ecz_" + ip);
            if(data && data.Eczane) {
                el.innerText = data.Eczane;
                el.style.background = "#238636";
            } else {
                el.innerText = "İşlem Yok";
                el.style.background = "#30363d";
            }
        });
    }

    function toggleUser(ip, status) {
        db.ref("AllowedIPs/" + ip + "/Status").set(status === "Active" ? "Passive" : "Active");
    }

    function setReportUser(ip, name) {
        activeReportIp = ip;
        document.getElementById("reportingUser").innerText = name;
        document.getElementById("reportSection").style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function generateReport() {
        const y = document.getElementById("reportYear").value;
        const m = document.getElementById("reportMonth").value;
        const div = document.getElementById("reportContent");
        div.innerHTML = "Yükleniyor...";

        const snap = await db.ref(`Logs/${y}/${m}`).once("value");
        if(!snap.exists()) { div.innerHTML = "Kayıt bulunamadı."; return; }

        let html = `<table><tr><th>Saat</th><th>Eczane/GLN</th><th>İlaç</th><th>Parti/SKT</th><th>Karekod</th></tr>`;
        let count = 0;

        snap.forEach(dayNode => {
            const userLogs = dayNode.child(activeReportIp);
            if(userLogs.exists()) {
                userLogs.forEach(entry => {
                    const log = entry.val();
                    count++;
                    html += `<tr>
                        <td>${dayNode.key}/${m} - ${log.Zaman}</td>
                        <td>${log.Eczane || '-'}<br><small>${log.GLN || ''}</small></td>
                        <td>${log.İlaç}</td>
                        <td>${log.Parti || '-'}<br><small>${log.SKT || ''}</small></td>
                        <td><code>${log.SN}</code></td>
                    </tr>`;
                });
            }
        });
        div.innerHTML = `<h4>Toplam ${count} kayıt bulundu.</h4>` + html + "</table>";
    }
</script>
</body>
</html>
