<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>m1portal | Yönetim Merkezi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h2, h3 { color: var(--blue); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0d1117; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 14px; }
        th { background: #1c2128; color: var(--blue); }
        tr:hover { background: #1c2128; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: #fff; font-weight: bold; margin-right: 5px; transition: 0.3s; }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--blue); }
        .btn:hover { opacity: 0.8; }
        input, select { background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 4px; margin-right: 10px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        .status-active { color: var(--green); font-weight: bold; }
        .status-passive { color: var(--red); font-weight: bold; }
        .badge { background: var(--blue); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🚀 m1portal Kontrol Paneli</h2>
        <div id="adminStatus">Giriş yapılıyor...</div>
    </div>

    <div class="card">
        <h3>👥 Kayıtlı Kullanıcılar ve Cihazlar</h3>
        <div id="userList">Yükleniyor...</div>
    </div>

    <div class="card" id="reportSection" style="display:none;">
        <h3>📊 Detaylı İşlem Raporu</h3>
        <div style="margin-bottom: 15px;">
            <select id="reportYear">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
            <select id="reportMonth">
                <option value="01">Ocak</option><option value="02">Şubat</option>
                <option value="03">Mart</option><option value="04">Nisan</option>
                <option value="05">Mayıs</option><option value="06">Haziran</option>
                <option value="07">Temmuz</option><option value="08">Ağustos</option>
                <option value="09">Eylül</option><option value="10">Ekim</option>
                <option value="11">Kasım</option><option value="12">Aralık</option>
            </select>
            <button class="btn btn-blue" onclick="generateReport()">Raporu Getir</button>
        </div>
        <div id="reportContent">Lütfen yukarıdan bir kullanıcı seçip "Raporla" diyiniz.</div>
    </div>
</div>

<script>
    // --- FIREBASE AYARLARI ---
    const firebaseConfig = {
        databaseURL: "BURAYA_KENDI_FIREBASE_URL_ADRESINI_YAZ" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let activeReportIp = "";
    let sessionAdmin = prompt("Yönetici Anahtarı:");

    if(sessionAdmin) {
        document.getElementById("adminStatus").innerText = "Yönetici: " + sessionAdmin;
        loadUsers();
    }

    function loadUsers() {
        db.ref("AllowedIPs").on("value", snap => {
            const users = snap.val();
            let html = "";
            for(let ip in users) {
                const u = users[ip];
                const statusClass = u.Status === "Active" ? "status-active" : "status-passive";
                
                html += `<div class="user-row">
                    <div>
                        <strong id="name_${ip.replace(/_/g,'.')}">${u.UserName}</strong> 
                        <span style="font-size:12px; color:#8b949e;">(${ip.replace(/_/g,'.')})</span>
                        <span id="eczane_${ip}" class="badge">Eczane Aranıyor...</span>
                        <div class="${statusClass}">${u.Status === "Active" ? "● AKTİF" : "○ PASİF"}</div>
                    </div>
                    <div>
                        <button class="btn btn-blue" onclick="setReportUser('${ip}')">Raporla</button>
                        <button class="btn ${u.Status === 'Active' ? 'btn-red' : 'btn-green'}" onclick="toggleUser('${ip}', '${u.Status}')">
                            ${u.Status === 'Active' ? 'Durdur' : 'Aktif Et'}
                        </button>
                    </div>
                </div>`;
                
                // Cihazın en son hangi eczanede olduğunu çekip başlığa ekle
                fetchEczaneInfo(ip);
            }
            document.getElementById("userList").innerHTML = html;
        });
    }

    function fetchEczaneInfo(ip) {
        db.ref("LiveTraffic/" + ip).on("value", snap => {
            const data = snap.val();
            const badge = document.getElementById("eczane_" + ip);
            if(data && data.Eczane) {
                badge.innerText = data.Eczane;
                badge.style.background = "#238636";
            } else {
                badge.innerText = "Veri Yok";
                badge.style.background = "#30363d";
            }
        });
    }

    function toggleUser(ip, currentStatus) {
        const newStatus = currentStatus === "Active" ? "Passive" : "Active";
        db.ref("AllowedIPs/" + ip + "/Status").set(newStatus);
    }

    function setReportUser(ip) {
        activeReportIp = ip;
        document.getElementById("reportSection").style.display = "block";
        document.getElementById("reportContent").innerHTML = "Rapor hazırlamak için 'Raporu Getir' butonuna basın.";
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function generateReport() {
        if(!activeReportIp) return;
        const y = document.getElementById("reportYear").value;
        const m = document.getElementById("reportMonth").value;
        const content = document.getElementById("reportContent");
        content.innerHTML = "Veriler taranıyor...";

        const snap = await db.ref(`Logs/${y}/${m}`).once("value");
        if(!snap.exists()) { content.innerHTML = "Bu ayda kayıt bulunamadı."; return; }

        let html = `<table>
            <tr>
                <th>Tarih</th>
                <th>Saat</th>
                <th>Eczane / GLN</th>
                <th>İlaç Bilgisi</th>
                <th>Parti / SKT</th>
                <th>Karekod (SN)</th>
            </tr>`;
        
        let totalCount = 0;

        snap.forEach(dayNode => {
            const day = dayNode.key;
            const userLogs = dayNode.child(activeReportIp);
            if(userLogs.exists()) {
                userLogs.forEach(logEntry => {
                    const log = logEntry.val();
                    totalCount++;
                    html += `<tr>
                        <td>${day}/${m}/${y}</td>
                        <td>${log.Zaman}</td>
                        <td><strong>${log.Eczane || 'Bilinmiyor'}</strong><br><small>${log.GLN || '-'}</small></td>
                        <td>${log.İlaç}<br><small>GTIN: ${log.GTIN}</small></td>
                        <td>P: ${log.Parti || '-'}<br>S: ${log.SKT || '-'}</td>
                        <td><code style="color:var(--blue)">${log.SN}</code></td>
                    </tr>`;
                });
            }
        });

        content.innerHTML = `<h3>Bu ay toplam ${totalCount} işlem yapıldı.</h3>` + html + `</table>`;
    }
</script>

</body>
</html>
